server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text responses.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed Vite assets are immutable.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown route returns index.html so React Router /
    # client routing works even on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Don't cache the entry HTML so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
